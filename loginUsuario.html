<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Mutual El Roble</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/LogoArbol.png">
</head>


<body class="loginUsuario">

    <div class="login-container">

        <img src="img/iconoUser.png" alt="Icono Usuario">
        
        <div id="login-form">
            <input type="text" id="username" placeholder="Usuario" required>
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <button id="login-btn" class="logearse" type="submit">Ingresar</button>
        </div>

        <div id="welcome-message" class="d-none text-center p-4">
            <h2 id="display-name" style="color: black;"></h2>
            <button id="logout-btn" class="btn btn-secondary mt-2">Cerrar sesión</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
